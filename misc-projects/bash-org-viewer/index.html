var cur=null;
function escHtml(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function showQuote(id){
  var q=null;
  for(var i=0;i<Q.length;i++){if(Q[i].id===id){q=Q[i];break;}}
  if(!q)return false;
  cur=q;
  document.getElementById("quote-box").innerHTML=escHtml(q.t);
  document.getElementById("quote-id").innerHTML='<a href="https://bash-org-archive.com/?'+q.id+'" target="_blank" rel="noopener">#'+q.id+'</a>';
  location.hash="#"+q.id;
  return true;
}
function randomQuote(){
  var idx=Math.floor(Math.random()*Q.length);
  if(cur&&Q.length>1){while(Q[idx].id===cur.id)idx=Math.floor(Math.random()*Q.length);}
  return Q[idx];
}
function newQuote(){showQuote(randomQuote().id);}
function shareLink(){
  var url=location.href;
  navigator.clipboard.writeText(url).then(function(){
    var btn=document.getElementById("share-btn");
    btn.textContent="Copied!";
    btn.classList.add("copied");
    setTimeout(function(){btn.textContent="Share Link";btn.classList.remove("copied");},1500);
  });
}
(function(){
  var h=location.hash.replace("#","");
  if(h&&!isNaN(h)){if(showQuote(parseInt(h)))return;}
  newQuote();
})();
</script>
