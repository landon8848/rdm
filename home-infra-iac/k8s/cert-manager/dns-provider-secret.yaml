# VSO syncs secret/cert-manager/dns-provider from Vault into this Kubernetes
# Secret. cert-manager reads it as a normal Secret — no Vault awareness needed.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: dns-api-token
  namespace: cert-manager
spec:
  type: kv-v2
  mount: secret
  path: cert-manager/dns-provider
  destination:
    name: dns-api-token
    create: true
  vaultAuthRef: vault-auth
  refreshAfter: 1h
