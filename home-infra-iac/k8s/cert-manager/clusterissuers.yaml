# Step 1: Bootstrap a self-signed issuer to mint the internal CA cert
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Step 2: The internal CA cert — sign this with the bootstrap issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rdm-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: example.com
  secretName: rdm-ca-secret
  duration: 87600h  # 10 years
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 384
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
---
# Step 3: The CA issuer — used by all internal services
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: rdm-ca
spec:
  ca:
    secretName: rdm-ca-secret
---
# Let's Encrypt staging — safe for testing, won't hit LE rate limits.
# Requires the cloudflare-api-token secret (see bootstrap-ingress.sh).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: user@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
# Let's Encrypt production — flip issuerRef to this once staging validates.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: user@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
