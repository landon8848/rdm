apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: forgejo
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: forgejo
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: forgejo
    serviceAccount: vault-auth
---
# Syncs secret/forgejo/admin from Vault → forgejo-admin-secret Kubernetes Secret
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: forgejo-admin-secret
  namespace: forgejo
spec:
  type: kv-v2
  mount: secret
  path: forgejo/admin
  destination:
    name: forgejo-admin-secret
    create: true
  vaultAuthRef: vault-auth
  refreshAfter: 1h
