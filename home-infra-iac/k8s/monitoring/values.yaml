# kube-prometheus-stack — lightweight homelab config
# Helm chart: prometheus-community/kube-prometheus-stack

grafana:
  adminPassword: ""  # Set via Vault secret below
  admin:
    existingSecret: grafana-admin-secret
    userKey: username
    passwordKey: password
  grafana.ini:
    server:
      root_url: https://grafana.example.com
    auth:
      signout_redirect_url: https://auth.example.com/application/o/grafana/end-session/
      oauth_auto_login: true
    auth.generic_oauth:
      enabled: true
      name: Authentik
      client_id: $__file{/etc/secrets/authentik/client_id}
      client_secret: $__file{/etc/secrets/authentik/client_secret}
      scopes: openid profile email
      auth_url: https://auth.example.com/application/o/authorize/
      token_url: https://auth.example.com/application/o/token/
      api_url: https://auth.example.com/application/o/userinfo/
      role_attribute_path: "contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'"
  initChownData:
    enabled: false
  extraSecretMounts:
    - name: authentik-oauth
      secretName: grafana-oidc-secret
      defaultMode: 0440
      mountPath: /etc/secrets/authentik
      readOnly: true
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: local-path
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.loki.svc.cluster.local:3100
      isDefault: false

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  enabled: false  # Keep it simple for now

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
