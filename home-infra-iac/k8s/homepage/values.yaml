# Homepage Dashboard — Helm values
# Chart: jameswynn/homepage
# Docs: https://gethomepage.dev
#
# Helm install:
#   helm repo add jameswynn https://jameswynn.github.io/helm-charts
#   helm install homepage jameswynn/homepage \
#     --namespace homepage --create-namespace \
#     --values k8s/homepage/values.yaml --wait

image:
  repository: ghcr.io/gethomepage/homepage
  tag: latest

env:
  HOMEPAGE_ALLOWED_HOSTS: nexus.example.com

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi

# Disable built-in ingress — we manage our own Traefik IngressRoute
ingress:
  main:
    enabled: false

# Mount config from ConfigMap
config:
  # Settings
  settings:
    title: nexus
    favicon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/homepage.png
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Infrastructure:
        style: row
        columns: 4
      Media:
        style: row
        columns: 2
      "*arr":
        style: row
        columns: 3
      Automation:
        style: row
        columns: 1
      Identity & Security:
        style: row
        columns: 2
      Monitoring:
        style: row
        columns: 2

  # Service widgets
  services:
    - Infrastructure:
        - ArgoCD:
            icon: argo-cd
            href: https://argo.example.com
            description: GitOps continuous delivery
            siteMonitor: https://argo.example.com
        - Forgejo:
            icon: forgejo
            href: https://git.example.com
            description: Git server
            siteMonitor: https://git.example.com
        - Traefik:
            icon: traefik
            href: https://traefik.example.com
            description: Reverse proxy & ingress
            siteMonitor: https://traefik.example.com
        - Proxmox:
            icon: proxmox
            href: https://prox.example.com:8006
            description: Hypervisor
            siteMonitor: https://prox.example.com:8006
    - Media:
        - Plex:
            icon: plex
            href: https://plex.example.com
            description: Media streaming
            siteMonitor: https://plex.example.com
        - qBittorrent:
            icon: qbittorrent
            href: https://qbit.example.com
            description: Torrent client
            siteMonitor: https://qbit.example.com
    - "*arr":
        - Prowlarr:
            icon: prowlarr
            href: https://prowlarr.example.com
            description: Indexer manager
            siteMonitor: http://prowlarr.arr.svc.cluster.local:9696/ping
        - Sonarr:
            icon: sonarr
            href: https://sonarr.example.com
            description: TV automation
            siteMonitor: http://sonarr.arr.svc.cluster.local:8989/ping
        - Radarr:
            icon: radarr
            href: https://radarr.example.com
            description: Movie automation
            siteMonitor: http://radarr.arr.svc.cluster.local:7878/ping
    - Automation:
        - Home Assistant:
            icon: home-assistant
            href: https://hass.example.com
            description: Home automation
            siteMonitor: https://hass.example.com/manifest.json
    - Identity & Security:
        - Authentik:
            icon: authentik
            href: https://auth.example.com
            description: Single sign-on
            siteMonitor: https://auth.example.com
        - Vault:
            icon: vault
            href: https://vault.example.com:8200
            description: Secrets management
            siteMonitor: https://vault.example.com:8200/v1/sys/health
    - Monitoring:
        - Grafana:
            icon: grafana
            href: https://grafana.example.com
            description: Dashboards & observability
            siteMonitor: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80/api/health
        - Pi-hole:
            icon: pi-hole
            href: https://pihole-01.example.com/admin
            description: DNS & ad blocking
            siteMonitor: https://pihole-01.example.com/admin/

  # Top bar widgets
  widgets:
    - search:
        provider: google
        target: _blank
    - greeting:
        text_size: xl
        text: nexus
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: true
    - openmeteo:
        label: Home
        units: imperial
        cache: 5

  # Bookmarks (optional — add personal links here)
  bookmarks: []

  # Kubernetes integration — Homepage can auto-discover services via k8s API
  kubernetes:
    mode: cluster

# ServiceAccount for k8s widget integration
serviceAccount:
  create: true
  name: homepage

enableRbac: true
