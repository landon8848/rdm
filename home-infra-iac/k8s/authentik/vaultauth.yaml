apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: authentik
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: authentik
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: authentik
    serviceAccount: vault-auth
---
# Admin credentials: secret key, bootstrap token, bootstrap password
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authentik-admin-secret
  namespace: authentik
spec:
  type: kv-v2
  mount: secret
  path: authentik/admin
  destination:
    name: authentik-admin-secret
    create: true
  vaultAuthRef: vault-auth
  refreshAfter: 1h
---
# PostgreSQL credentials — used by both CNPG Cluster CRD (bootstrap) and
# Authentik env vars (connection). CNPG expects a kubernetes.io/basic-auth
# Secret with 'username' and 'password' keys.
#
# Vault path: secret/authentik/db
# Required keys: username, password
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authentik-db-secret
  namespace: authentik
spec:
  type: kv-v2
  mount: secret
  path: authentik/db
  destination:
    name: authentik-db-secret
    create: true
    type: kubernetes.io/basic-auth
  vaultAuthRef: vault-auth
  refreshAfter: 1h
