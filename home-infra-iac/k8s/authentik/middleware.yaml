# Traefik ForwardAuth middleware — delegates authentication to Authentik's
# embedded outpost. Any IngressRoute can reference this middleware to require
# Authentik login before granting access.
#
# Usage in other namespaces' IngressRoutes:
#   routes:
#     - match: Host(`mealie.example.com`)
#       kind: Rule
#       middlewares:
#         - name: authentik-forwardauth
#           namespace: authentik
#       services:
#         - name: mealie
#           port: 9000
#
# NOTE: The outpost service name below assumes the Authentik embedded outpost.
# If you create a standalone proxy outpost in the Authentik admin UI, update
# the service name to match (format: ak-outpost-<slug>).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: authentik
spec:
  forwardAuth:
    address: http://ak-outpost-authentik-embedded-outpost.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
