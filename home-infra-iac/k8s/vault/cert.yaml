apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: cert-manager
spec:
  secretName: vault-tls
  issuerRef:
    name: rdm-ca
    kind: ClusterIssuer
  duration: 8760h    # 1 year
  renewBefore: 720h  # renew 30 days before expiry
  dnsNames:
    - "*.example.com"
    - example.com
  ipAddresses:
    - 192.168.1.191
