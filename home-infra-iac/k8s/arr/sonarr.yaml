# Sonarr — TV show library automation.
# Watches qBittorrent for completed downloads and hardlinks them into
# /data/media/tv, keeping the original files in place so seeding continues.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: arr
  labels:
    app: sonarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      # Verify the NFS volume is actually mounted before starting Sonarr —
      # same pattern as qBittorrent. Sonarr creating directories on an empty
      # mount would mask a real NFS outage.
      initContainers:
        - name: wait-for-nfs
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Checking NFS data volume..."
              if [ ! -d /data/downloads ] || [ ! -d /data/media ]; then
                echo "ERROR: /data/downloads or /data/media not found — NFS volume may not be mounted."
                exit 1
              fi
              echo "NFS data volume is available."
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.17
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Chicago
          ports:
            - name: http
              containerPort: 8989
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: data
          persistentVolumeClaim:
            claimName: arr-nfs
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: arr
  labels:
    app: sonarr
spec:
  selector:
    app: sonarr
  ports:
    - name: http
      port: 8989
      targetPort: http
      protocol: TCP
  type: ClusterIP
