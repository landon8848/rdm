apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: argocd
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: argocd
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: argocd
    serviceAccount: vault-auth
---
# VSO syncs the Forgejo deploy key from Vault and creates an ArgoCD repo secret.
# The label tells ArgoCD this Secret is a repository credential.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: forgejo-repo
  namespace: argocd
spec:
  type: kv-v2
  mount: secret
  path: argocd/forgejo-repo
  destination:
    name: forgejo-repo
    create: true
    labels:
      argocd.argoproj.io/secret-type: repository
  vaultAuthRef: vault-auth
  refreshAfter: 1h
