apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@git.example.com:rdm/rdm-local.git
    targetRevision: main
    path: k8s/forgejo
    directory:
      exclude: "values.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
