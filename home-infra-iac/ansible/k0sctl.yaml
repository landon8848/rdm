apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: my-k0s

spec:
  hosts:
    - ssh:
        address: 192.168.1.247
        user: myadmin
        keyPath: ~/.ssh/id_ed25519
      role: controller

    - ssh:
        address: 192.168.1.143
        user: myadmin
        keyPath: ~/.ssh/id_ed25519
      role: worker

    - ssh:
        address: 192.168.1.135
        user: myadmin
        keyPath: ~/.ssh/id_ed25519
      role: worker

  k0s:
    version: v1.32.3+k0s.0
    config:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: my-k0s
      spec:
        api:
          address: 192.168.1.247
          externalAddress: 192.168.1.247
          sans:
            - 192.168.1.247
            - k0sm-00.example.com
        network:
          podCIDR: "10.244.0.0/16"
          serviceCIDR: "10.96.0.0/12"
          provider: kuberouter
        telemetry:
          enabled: false
