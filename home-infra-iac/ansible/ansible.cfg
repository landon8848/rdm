[defaults]
inventory          = inventory/hosts.yml
roles_path         = roles
remote_user        = myadmin
private_key_file   = ~/.ssh/id_ed25519
host_key_checking  = False
stdout_callback    = default
result_format      = yaml
callbacks_enabled  = profile_tasks
gathering          = smart
fact_caching       = memory

[privilege_escalation]
become        = true
become_method = sudo
become_user   = root
