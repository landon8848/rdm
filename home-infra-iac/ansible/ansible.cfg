[defaults]
inventory          = inventory/hosts.yml
roles_path         = roles
remote_user        = myadmin
private_key_file   = ~/.ssh/id_ed25519
host_key_checking  = False
stdout_callback    = default
result_format      = yaml
callbacks_enabled  = profile_tasks
gathering          = smart
fact_caching       = memory
# Accept whichever python3 ansible discovers on the target without the
# noisy "future installation" warning. All our hosts ship with a single
# distro-provided python3, so discovery is deterministic in practice.
interpreter_python = auto_silent

[privilege_escalation]
become        = true
become_method = sudo
become_user   = root
