---
timezone: America/Chicago

domain: example.com

# Traefik ingress IP — all *.example.com resolves here by default
traefik_ip: 192.168.1.87

# Hosts that bypass Traefik and go directly to their VM IP
dns_direct_hosts:
  - { name: pihole-01,  ip: 192.168.1.6 }
  - { name: vault,      ip: 192.168.1.140 }
  - { name: k0sm-00,    ip: 192.168.1.247 }
  - { name: k0sw-00,    ip: 192.168.1.143 }
  - { name: k0sw-01,    ip: 192.168.1.135 }
  - { name: prox,       ip: 192.168.1.148 }
  - { name: nfs-01,     ip: 192.168.1.125 }
  - { name: hass,       ip: 192.168.1.89  }

# CNAME aliases within {{ domain }}. Target must be a name dnsmasq already
# knows (i.e. defined in dns_direct_hosts or another cname entry).
dns_cnames:
  - { alias: hole, target: pihole-01.example.com }

vault_addr: "https://192.168.1.140:8200"
vault_ca_cert: "/usr/local/share/ca-certificates/my-ca.crt"
vault_ca_cert_content: "{{ lookup('file', '~/.vault-ca.crt') }}"

upstream_dns:
  - 208.67.222.222   # OpenDNS primary (DNSSEC)
  - 208.67.220.220   # OpenDNS secondary (DNSSEC)

base_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - dnsutils
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - gnupg
  - qemu-guest-agent
  - python3-pip
