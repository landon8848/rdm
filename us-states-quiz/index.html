<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name the 50 US States</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: #1f2937;
      border-bottom: 2px solid #374151;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.6rem;
      color: #f9fafb;
      letter-spacing: -0.5px;
    }

    .header-stats {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .stat-block {
      text-align: center;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
    }

    #timer-value { color: #fbbf24; }
    #count-value { color: #34d399; }

    /* ── Main layout ─────────────────────────────────────────── */
    .game-wrap {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Map ─────────────────────────────────────────────────── */
    .map-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 16px 16px 10px;
    }

    #map svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .state-path {
      fill: #374151;
      stroke: #9ca3af;
      stroke-width: 0.6;
      transition: fill 0.35s ease;
    }

    .state-path.found {
      fill: #16a34a;
    }

    .state-path.missed {
      fill: #b91c1c;
    }

    /* ── Progress bar ─────────────────────────────────────────── */
    .progress-track {
      height: 8px;
      background: #374151;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #16a34a, #4ade80);
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    /* ── Input row ────────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: stretch;
    }

    #state-input {
      flex: 0 1 340px;
      padding: 11px 18px;
      font-size: 1.05rem;
      border: 2px solid #4b5563;
      border-radius: 8px;
      background: #1f2937;
      color: #f9fafb;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #state-input:focus {
      border-color: #6366f1;
    }

    #state-input.flash-correct {
      border-color: #4ade80;
      background: #052e16;
    }

    #state-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn {
      padding: 11px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }

    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-primary { background: #4f46e5; color: #fff; }

    /* ── State grid ───────────────────────────────────────────── */
    .states-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 16px;
    }

    .states-card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .states-card-header h2 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #6b7280;
    }

    #miss-count {
      font-size: 0.72rem;
      color: #6b7280;
    }

    .states-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .state-cell {
      padding: 5px 8px;
      border-radius: 5px;
      font-size: 0.8rem;
      background: #111827;
      color: #4b5563;
      transition: background 0.3s, color 0.3s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .state-cell .check {
      flex-shrink: 0;
      width: 12px;
      color: #4ade80;
      font-size: 0.75rem;
    }

    .state-cell.found {
      background: #052e16;
      color: #d1fae5;
    }

    .state-cell.missed {
      background: #450a0a;
      color: #fca5a5;
    }

    /* ── Game-over overlay ────────────────────────────────────── */
    .game-over-banner {
      display: none;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }

    .game-over-banner.visible { display: block; }

    .game-over-banner h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .game-over-banner p {
      color: #9ca3af;
      margin-bottom: 16px;
    }

    /* ── Responsive tweaks ────────────────────────────────────── */
    @media (max-width: 640px) {
      .states-grid { grid-template-columns: repeat(3, 1fr); }
      header h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Name the 50 US States</h1>
  <div class="header-stats">
    <div class="stat-block">
      <div class="stat-label">Found</div>
      <div class="stat-value" id="count-value">0 / 50</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer-value">15:00</div>
    </div>
  </div>
</header>

<div class="game-wrap">

  <div class="map-card">
    <div id="map"></div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="input-row">
    <input
      type="text"
      id="state-input"
      placeholder="Type a state name…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button class="btn btn-danger" id="give-up-btn">Give Up</button>
  </div>

  <div class="states-card">
    <div class="states-card-header">
      <h2>States Found</h2>
      <span id="miss-count"></span>
    </div>
    <div class="states-grid" id="states-grid"></div>
  </div>

  <div class="game-over-banner" id="game-over-banner">
    <h2 id="game-over-headline"></h2>
    <p id="game-over-sub"></p>
    <button class="btn btn-primary" id="play-again-btn">Play Again</button>
  </div>

</div>

<script>
// ── State data (FIPS → name) ─────────────────────────────────────
const FIPS_TO_NAME = {
  "01":"Alabama","02":"Alaska","04":"Arizona","05":"Arkansas",
  "06":"California","08":"Colorado","09":"Connecticut","10":"Delaware",
  "12":"Florida","13":"Georgia","15":"Hawaii","16":"Idaho",
  "17":"Illinois","18":"Indiana","19":"Iowa","20":"Kansas",
  "21":"Kentucky","22":"Louisiana","23":"Maine","24":"Maryland",
  "25":"Massachusetts","26":"Michigan","27":"Minnesota","28":"Mississippi",
  "29":"Missouri","30":"Montana","31":"Nebraska","32":"Nevada",
  "33":"New Hampshire","34":"New Jersey","35":"New Mexico","36":"New York",
  "37":"North Carolina","38":"North Dakota","39":"Ohio","40":"Oklahoma",
  "41":"Oregon","42":"Pennsylvania","44":"Rhode Island","45":"South Carolina",
  "46":"South Dakota","47":"Tennessee","48":"Texas","49":"Utah",
  "50":"Vermont","51":"Virginia","53":"Washington","54":"West Virginia",
  "55":"Wisconsin","56":"Wyoming"
};

const NAME_TO_FIPS = Object.fromEntries(
  Object.entries(FIPS_TO_NAME).map(([f, n]) => [n, f])
);

// Sorted list of all state names
const ALL_STATES = Object.values(FIPS_TO_NAME).sort();

// Fast lookup: normalised input → canonical name
const LOOKUP = Object.fromEntries(
  ALL_STATES.map(n => [n.toLowerCase(), n])
);

// ── Game state ───────────────────────────────────────────────────
let foundStates = new Set();
let gameActive  = false;
let secondsLeft = 15 * 60;
let timerHandle = null;

// ── DOM refs ─────────────────────────────────────────────────────
const inputEl      = document.getElementById('state-input');
const countEl      = document.getElementById('count-value');
const timerEl      = document.getElementById('timer-value');
const progressEl   = document.getElementById('progress-fill');
const gridEl       = document.getElementById('states-grid');
const giveUpBtn    = document.getElementById('give-up-btn');
const banner       = document.getElementById('game-over-banner');
const bannerHead   = document.getElementById('game-over-headline');
const bannerSub    = document.getElementById('game-over-sub');
const playAgainBtn = document.getElementById('play-again-btn');
const missCountEl  = document.getElementById('miss-count');

// ── Build state grid ─────────────────────────────────────────────
function buildGrid() {
  gridEl.innerHTML = '';
}

function cellId(name) {
  return 'cell-' + name.replace(/\s+/g, '-');
}

function makeCell(name, cls) {
  const cell = document.createElement('div');
  cell.className = 'state-cell ' + cls;
  cell.id = cellId(name);

  const check = document.createElement('span');
  check.className = 'check';
  check.textContent = cls === 'found' ? '✓' : '✗';

  const label = document.createElement('span');
  label.textContent = name;

  cell.appendChild(check);
  cell.appendChild(label);
  return cell;
}

// Insert a cell in alphabetical order among existing cells
function insertCellSorted(cell, name) {
  const existing = Array.from(gridEl.children);
  const after = existing.find(el => el.querySelector('span:last-child').textContent > name);
  gridEl.insertBefore(cell, after || null);
}

// ── Timer ────────────────────────────────────────────────────────
function startTimer() {
  timerHandle = setInterval(() => {
    secondsLeft--;
    renderTimer();
    if (secondsLeft <= 0) endGame(false);
  }, 1000);
}

function renderTimer() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
  timerEl.style.color = secondsLeft <= 60 ? '#f87171' : '#fbbf24';
}

// ── Check input ──────────────────────────────────────────────────
function checkInput(raw) {
  if (!gameActive) return;

  const key = raw.trim().toLowerCase();
  if (key.length < 4) return;           // shortest state name is 4 chars

  const canonical = LOOKUP[key];
  if (canonical && !foundStates.has(canonical)) {
    markFound(canonical);
  }
}

function markFound(name) {
  foundStates.add(name);

  // Shade the SVG path
  const fips = NAME_TO_FIPS[name];
  d3.select(`#path-${fips}`).classed('found', true);

  // Add cell to grid in sorted position
  insertCellSorted(makeCell(name, 'found'), name);

  // Update counter & progress
  const n = foundStates.size;
  countEl.textContent = `${n} / 50`;
  progressEl.style.width = `${(n / 50) * 100}%`;

  // Flash input green and clear
  inputEl.value = '';
  inputEl.classList.add('flash-correct');
  setTimeout(() => inputEl.classList.remove('flash-correct'), 350);

  if (n === 50) endGame(true);
}

// ── End game ─────────────────────────────────────────────────────
function endGame(won) {
  clearInterval(timerHandle);
  gameActive = false;
  inputEl.disabled = true;
  giveUpBtn.disabled = true;

  const missed = ALL_STATES.filter(n => !foundStates.has(n));

  if (won) {
    bannerHead.textContent = 'Congratulations!';
    bannerHead.style.color = '#4ade80';
    bannerSub.textContent  = `You named all 50 states with ${fmtTime(secondsLeft)} remaining.`;
  } else {
    bannerHead.textContent = `Time's up — ${foundStates.size} / 50`;
    bannerHead.style.color = '#f87171';
    bannerSub.textContent  = `${missed.length} state${missed.length !== 1 ? 's' : ''} not found.`;

    // Reveal missed states in red
    missed.forEach(name => {
      const fips = NAME_TO_FIPS[name];
      d3.select(`#path-${fips}`).classed('missed', true);
      insertCellSorted(makeCell(name, 'missed'), name);
    });

    missCountEl.textContent = `${missed.length} missed`;
  }

  banner.classList.add('visible');
}

function fmtTime(s) {
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

// ── Init / restart ───────────────────────────────────────────────
function initGame() {
  clearInterval(timerHandle);
  foundStates.clear();
  secondsLeft = 15 * 60;
  gameActive  = true;

  countEl.textContent  = '0 / 50';
  progressEl.style.width = '0%';
  missCountEl.textContent = '';
  renderTimer();

  inputEl.disabled  = false;
  inputEl.value     = '';
  giveUpBtn.disabled = false;
  banner.classList.remove('visible');

  d3.selectAll('.state-path').classed('found', false).classed('missed', false);

  buildGrid();
  startTimer();
  inputEl.focus();
}

// ── Event listeners ──────────────────────────────────────────────
inputEl.addEventListener('input', e => checkInput(e.target.value));

// Also support Enter for manual submission
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') checkInput(e.target.value);
});

giveUpBtn.addEventListener('click', () => {
  if (gameActive) endGame(false);
});

playAgainBtn.addEventListener('click', initGame);

// ── Load map ─────────────────────────────────────────────────────
async function loadMap() {
  const us = await d3.json(
    'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json'
  );

  const W = 960, H = 580;

  const projection = d3.geoAlbersUsa()
    .scale(1280)
    .translate([W / 2, H / 2]);

  const pathGen = d3.geoPath().projection(projection);

  const svg = d3.select('#map')
    .append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  const statesFeature = topojson.feature(us, us.objects.states);

  // State fills
  svg.selectAll('.state-path')
    .data(statesFeature.features)
    .enter()
    .append('path')
    .attr('class', 'state-path')
    .attr('id', d => `path-${String(d.id).padStart(2, '0')}`)
    .attr('d', pathGen);

  // Interior borders (crisp lines between states)
  svg.append('path')
    .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
    .attr('fill', 'none')
    .attr('stroke', '#6b7280')
    .attr('stroke-width', 0.8)
    .attr('d', pathGen);

  // Outer nation border
  svg.append('path')
    .datum(topojson.merge(us, us.objects.states.geometries))
    .attr('fill', 'none')
    .attr('stroke', '#9ca3af')
    .attr('stroke-width', 1.4)
    .attr('d', pathGen);

  initGame();
}

loadMap();
</script>
</body>
</html>
